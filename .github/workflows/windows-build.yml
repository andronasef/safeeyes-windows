name: Windows Build

# Builds the standalone Windows executable (PyInstaller) and installer
# (Inno Setup), runs the test suite, and uploads both as artifacts. On a
# version tag (v*) it also publishes a GitHub Release with the installer.

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 babel packaging pyinstaller pytest time-machine

      - name: Compile translations
        run: python build_messages.py

      - name: Run tests
        run: pytest -q

      - name: Build executable (PyInstaller)
        run: pyinstaller packaging/windows/safeeyes.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows\installer.iss

      - name: Upload application bundle
        uses: actions/upload-artifact@v4
        with:
          name: SafeEyes-windows-bundle
          path: dist/SafeEyes
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SafeEyes-windows-installer
          path: packaging/windows/installer/*.exe
          if-no-files-found: error

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/installer/*.exe
          generate_release_notes: true
